<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fleet Overview – GTM Metrics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060d14;color:#cde0f0;font-family:'DM Sans','Segoe UI',sans-serif;padding:28px 32px;min-height:100vh}
::-webkit-scrollbar{width:6px;background:#060d14}
::-webkit-scrollbar-thumb{background:#2a3f55;border-radius:4px}
h1{font-size:26px;font-weight:800;color:#e8f4ff;letter-spacing:-0.5px}
.subtitle{color:#8899aa;font-size:13px;margin-top:4px}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.pills{display:flex;gap:8px}
.pill{background:#0b1623;border:1px solid #162435;border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:1px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.kpi-card{background:#0b1623;border:1px solid #162435;border-radius:12px;padding:18px 16px;position:relative;overflow:hidden}
.kpi-accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:12px 0 0 12px}
.kpi-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8899aa;margin-bottom:8px}
.kpi-value{font-size:22px;font-weight:800;color:#cde0f0;font-family:'DM Mono',monospace}
.kpi-sub{font-size:11px;color:#8899aa;margin-top:4px}
.five-col{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px}
@media (max-width:900px){.five-col{grid-template-columns:repeat(2,1fr)}}
.cat-card{background:#0b1623;border:1px solid #162435;border-radius:12px;padding:16px 14px}
.cat-stat-label{font-size:9px;color:#8899aa;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.cat-stat-val{font-size:16px;font-weight:700;color:#cde0f0;font-family:'DM Mono',monospace;margin-bottom:12px}
.bar-track{background:#162435;border-radius:4px;height:6px;overflow:hidden;margin-bottom:4px}
.bar-fill{height:100%;border-radius:4px}
.bar-label{display:flex;justify-content:space-between;font-size:10px;color:#8899aa;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:20px">
    <img src="data:image/png;base64,REPLACE_WITH_YOUR_ORIGINAL_LOGO_BASE64_STRING" alt="Havoc" style="height:36px;opacity:0.9;filter:invert(1) brightness(2)"/>
    <div>
      <h1>Fleet Overview &ndash; GTM Metrics</h1>
      <div class="subtitle">Report date: 2026-07-17</div>
    </div>
  </div>
  <div class="pills">
    <span class="pill" style="color:#0ef0c4">USV</span>
    <span class="pill" style="color:#f5a623">Sim/Test</span>
    <span class="pill" style="color:#3b9eca">Contacts</span>
    <span class="pill" style="color:#c792ea">UGV</span>
    <span class="pill" style="color:#ff6b6b">UAV</span>
  </div>
</div>

<div class="kpi-grid">
  <div class="kpi-card"><div class="kpi-accent" style="background:#3b9eca"></div>
    <div class="kpi-label">Total Hours</div>
    <div class="kpi-value">31,584</div>
    <div class="kpi-sub">land + water combined</div>
  </div>
  <div class="kpi-card"><div class="kpi-accent" style="background:#0ef0c4"></div>
    <div class="kpi-label">Active Vessels</div>
    <div class="kpi-value">51</div>
    <div class="kpi-sub">in the last 30 days</div>
  </div>
  <div class="kpi-card"><div class="kpi-accent" style="background:#3b9eca"></div>
    <div class="kpi-label">Total Vessels</div>
    <div class="kpi-value">116</div>
    <div class="kpi-sub">all time</div>
  </div>
</div>

];

// catStats: 8,282 adj applied to the Rampage subset of USV (Gen1), folded
// into the USV category total.
const WATER_ADJ = 8282;
const catStats = {};
CATS.forEach(c=>{
  const b=RAW.filter(r=>r[1]===c);
  catStats[c]={
    boats: b.length,
    total: b.reduce((s,r)=>s+r[4],0) + (c==='USV' ? WATER_ADJ : 0)
  };
});

const rampageRows = RAW.filter(r => r[1] === 'USV' && r[5] === 'Rampage');
const otherUsvRows = RAW.filter(r => r[1] === 'USV' && r[5] === 'Other USV');

// Gen2-only total (Rampage subset raw, before +8,282 Gen1 fixed adjustment)
const rGen2 = rampageRows.reduce((s, r) => s + r[4], 0);
const rampageTotal = rGen2 + WATER_ADJ;
const otherUsvTotal = otherUsvRows.reduce((s, r) => s + r[4], 0);

function fmtI(n){ return Math.round(n).toLocaleString(); }

const maxAll = Math.max(...Object.values(catStats).map(c=>c.total));

const CARD_META = {
  'USV':      { id:'cat-usv',      title:'USV Total', sub:null },
  'Sim/Test': { id:'cat-simtest',  title:'Sim/Test',   sub:'SIM-LOCAL, TEST, HIL rigs' },
  'Contacts': { id:'cat-contacts', title:'Contacts',   sub:'Manned boats broadcasting via kitbox' },
  'UGV':      { id:'cat-ugv',      title:'UGV',        sub:'AZAK, etc.' },
  'UAV':      { id:'cat-uav',      title:'UAV',        sub:'None active yet' }
};

CATS.forEach(c=>{
  const meta = CARD_META[c];
  const col = CAT_COLORS[c];
  const total = catStats[c].total;
  const boats_ = catStats[c].boats;
  const el = document.getElementById(meta.id);
  if(!el) return;

  const subHtml = meta.sub
    ? `<div style="font-size:10px;color:#8899aa;margin-bottom:12px;font-style:italic">${meta.sub}</div>`
    : '';

  const extraHtml = (c === 'USV')
    ? `<div style="margin-top:4px;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px">
    <div>
      <div class="cat-stat-label">Rampage hours (${rampageRows.length} boats)</div>
      <div style="font-size:13px;font-weight:700;color:${col};font-family:'DM Mono',monospace">${fmtI(rampageTotal)} hrs</div>
    </div>
    <div>
      <div class="cat-stat-label">Other USV hours (${otherUsvRows.length} boats)</div>
      <div style="font-size:13px;font-weight:700;color:${col}cc;font-family:'DM Mono',monospace">${fmtI(otherUsvTotal)} hrs</div>
    </div>
    <div>
      <div class="cat-stat-label">Rampage Gen2</div>
      <div style="font-size:13px;font-weight:700;color:${col};font-family:'DM Mono',monospace">${fmtI(rGen2)} hrs</div>
    </div>
    <div>
      <div class="cat-stat-label">Rampage Gen1 (fixed)</div>
      <div style="font-size:13px;font-weight:700;color:${col}88;font-family:'DM Mono',monospace">${fmtI(WATER_ADJ)} hrs</div>
    </div>
  </div>
  <div style="font-size:9px;color:#8899aa;margin-top:10px;font-style:italic">Other USV: KK, Tideman, Atlas, etc.</div>`
    : '';

  const barPct = maxAll > 0 ? (total/maxAll*100).toFixed(1) : 0;

  el.innerHTML = `
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <div style="width:4px;height:20px;background:${col};border-radius:2px"></div>
    <div style="font-size:14px;font-weight:800;color:${col}">${meta.title}</div>

</html>
